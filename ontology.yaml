# 仮説検証Wiki オントロジー（SSoT・全プロジェクト共有）
#
# このファイルが語彙・型・関係・状態機械の唯一の正本(Single Source of Truth)。
# - ツール（tools/hwlint.py・tools/gen_views.py）は tools/ontology.py 経由でここを読む。
#   enum や STAGE_FOCUS 等をコードに再定義しない（＝二重管理・ドリフト防止）。
# - 人間可読な要約 ontology.md は `python3 tools/gen_ontology_doc.py` でここから生成する（手編集禁止）。
#
# 用語（Ontology-Playground 流）:
#   entity   = レコード種別（H / ACT / DEC）とそのサブタイプ（frontmatter type の enum）
#   relation = レコード間の型付きリンク。domain（始点の型）→ range（終点の型）、
#              cardinality（one=単一 / many=配列）、inverse（逆方向の呼称）を宣言する。
#   各 relation は frontmatter 配列 と 本文 wikilink の二重表現を持つ（must-wikilink: true）。

version: 1

# ── エンティティ（レコード種別とサブタイプ） ─────────────────────────────
entities:
  H:
    label: 仮説
    dir: hypotheses
    # サブタイプは価値連鎖（行動→課題→解決→市場スケール／自分たち）の順。
    # key        = list の mermaid subgraph ID / chain-label = その表示名 / role = 価値連鎖上の役割
    subtypes:
      - name: 状況・行動仮説
        key: beh
        chain-label: 状況・行動
        role: customer
      - name: 課題仮説
        key: prob
        chain-label: 切実な課題
        role: problem
      - name: ソリューション仮説
        key: sol
        chain-label: ソリューション
        role: solution
      - name: 市場スケール仮説    # 市場役割の型（PMF）。個別購買（対価・WTP）は型にせず、ソリューション仮説を〈支払い〉証拠で検証する観点として扱う
        key: mkt
        chain-label: 市場スケール
        role: market
      - name: 自分たち仮説
        key: team
        chain-label: 自分たち
        role: team

  ACT:
    label: 活動
    dir: activities
    subtypes:
      - {name: interview}
      - {name: demo}
      - {name: survey}
      - {name: mvp-test}
      - {name: desk-research}
      - {name: self-reflection}

  DEC:
    label: 意思決定
    dir: decisions
    subtypes:
      - {name: stage-transition}
      - {name: pivot}
      - {name: persevere}
      - {name: rollback}
      - {name: kill}

# ── 関係（型付きリンク） ─────────────────────────────────────────────
# field         = frontmatter キー
# domain / range= 始点 / 終点のエンティティ種別
# *-subtypes    = 省略可。サブタイプまで制約する場合のみ
# cardinality   = one（単一）| many（配列）
# inverse       = 逆方向の呼称（バックリンク表示・ナビゲーションに使う）
# must-wikilink = true なら本文にも wikilink を張る（Obsidian グラフに辺を出すため）
relations:
  - name: derived-from
    field: derived-from
    domain: H
    range: H
    cardinality: one
    inverse: derives
    must-wikilink: true
    label: 派生元
    inverse-label: 派生先
    description: 派生・ピボット・巻き戻し再出発の系譜（この仮説の派生元）

  - name: leads-to
    field: leads-to
    domain: H
    range: H
    cardinality: many
    inverse: led-from
    must-wikilink: true
    label: 因果先
    inverse-label: 因果元
    description: 因果的に導く先の仮説。list の mermaid バリューチェーン矢印になる

  - name: addresses
    field: addresses
    domain: H
    domain-subtypes: [ソリューション仮説]
    range: H
    range-subtypes: [課題仮説]
    cardinality: many
    inverse: addressed-by
    must-wikilink: false      # relations のフィット表は frontmatter から射影。本文 wikilink は必須にしない
    label: 対応課題
    inverse-label: 対応する価値
    description: ソリューション仮説→対応する課題仮説（バリュープロポジションのフィット）

  - name: hypotheses
    field: hypotheses
    domain: ACT
    range: H
    cardinality: many
    inverse: validated-by
    must-wikilink: true
    label: 検証対象
    inverse-label: 検証活動
    description: この活動が検証する仮説

  - name: based-on
    field: based-on
    domain: DEC
    range: ACT
    cardinality: many
    inverse: informs
    must-wikilink: true
    label: 根拠活動
    inverse-label: 導いた判断
    description: この意思決定の根拠となった活動

# ── 状態機械 ────────────────────────────────────────────────────────
state-machines:
  # 検証ステージ（正式名称は playbooks/<stage>.md の見出しが正典）
  stages:
    order: [CPF, FPF, PSF, SPF, PMF]
    names:
      CPF: Customer Problem Fit
      FPF: Founder Problem Fit
      PSF: Problem Solution Fit
      SPF: Solution Product Fit
      PMF: Product Market Fit

  # ステージ→重点仮説タイプ（importance: auto の解決に使う）
  stage-focus:
    CPF: [状況・行動仮説, 課題仮説]
    FPF: [課題仮説, 自分たち仮説]
    PSF: [ソリューション仮説]
    SPF: [ソリューション仮説]
    PMF: [市場スケール仮説]

  # importance: auto の重み。現在ステージの重点タイプ=focus、それ以外=other。
  # 手動指定（1-10）があればそれが優先（ビュー側で処理）。「次に検証すべき」の閾値も focus を使う。
  importance-weights:
    focus: 8
    other: 4

  # 検証ステータス（並び順 = ビューの集計・表示順）
  statuses:
    - {name: 検証済み, emoji: "✅"}
    - {name: 検証中,   emoji: "🔄"}
    - {name: 未検証,   emoji: "⚪"}
    - {name: 反証,     emoji: "❌"}

  # 確信度（1-10）
  confidence:
    min: 1
    max: 10
    fictional-cap: 8          # 架空/シミュレーションデータ由来の確信度は上限8
    fictional-markers: [架空, シミュレーション]   # 架空データを示す本文マーカー語彙（fictional-cap 判定に使う）
    # status × 確信度の許容域（外れたら warning）。検証の2軸の食い違い（矛盾）を検出する。
    status-bounds:
      検証済み: {min: 5}      # 検証済みなのに確信度が低い
      反証:     {max: 4}      # 反証なのに確信度が高い（もはや信じていないはず）
      未検証:   {max: 4}      # 未検証なのに確信度が高い（証拠なき高確信）
      # 検証中 は判断保留(3-4)〜手応え(5-6)まで幅広く正当。境界を設けない。
    # 確信度の帯ごとに要求する証拠の階梯の最低段（evidence-ladder の名）。
    # 本文の根拠タグにこの段以上の階梯タグが無いのに確信度だけ高い、を検出する（warning）。
    evidence-floor:
      - {min-confidence: 5, floor: 自認}      # 5-6 は〈自認〉以上を要する
      - {min-confidence: 7, floor: 実コスト}   # 7-8 は〈実コスト〉以上を要する

  # 証拠の階梯（弱→強）。確信度を上げる根拠の強さの序列。
  # 本文の根拠セルでは 〈発言〉のように山括弧つきで書く（ツールが山括弧を補う）。
  evidence-ladder: [発言, 自認, 実コスト, 行動, 支払い]
  # 階梯外の補助タグ（強さの序列を持たない証拠種別）。〈二次〉=二次情報、〈架空〉=架空/シミュレーション由来。
  evidence-aux: [二次, 架空]

# ── リーンキャンバス（仮説検証への写像） ─────────────────────────────
# リーンキャンバス(Ash Maurya)は**新しいレコード種別ではなく**、既存の仮説(H)群を
# 事業モデルの9ブロックへ射影した「ビュー」。/lean-canvas スキルが使う。
#   - 各ブロックは H サブタイプの役割(role)に対応する（maps-to-role。role の正本は
#     entities.H.subtypes.role。サブタイプ名でなく役割で結ぶのでドリフトに強い）。
#   - ブロックの検証状態は、対応 role の H の status から導出する（block-status）。新レコードは作らない。
# 心得(Why=本家準拠の方法論)は playbooks/lean-canvas.md、現場手順(How)は .claude/skills/lean-canvas/。
lean-canvas:
  # sketch-order = 本家推奨の記入順（網羅のための順。同値は一緒に描く）。
  # 検証の優先順は別（validation-order 参照）。
  blocks:
    - {key: segment,   label: 顧客セグメント,   en: Customer Segments,          maps-to-role: customer, sketch-order: 1}
    - {key: problem,   label: 課題,             en: Problem,                    maps-to-role: problem,  sketch-order: 2}
    - {key: uvp,       label: 独自の価値提案,   en: Unique Value Proposition,   maps-to-role: solution, sketch-order: 3}
    - {key: solution,  label: ソリューション,   en: Solution,                   maps-to-role: solution, sketch-order: 4}
    - {key: channels,  label: チャネル,         en: Channels,                   maps-to-role: market,   sketch-order: 5}
    - {key: revenue,   label: 収益の流れ,       en: Revenue Streams,            maps-to-role: market,   sketch-order: 6}
    - {key: cost,      label: コスト構造,       en: Cost Structure,             maps-to-role: market,   sketch-order: 6}
    - {key: metrics,   label: 主要指標,         en: Key Metrics,                maps-to-role: market,   sketch-order: 7}
    - {key: advantage, label: 圧倒的優位性,     en: Unfair Advantage,           maps-to-role: team,     sketch-order: 8}

  # ブロック検証状態の射影規則（対応 role の H 群から導出。新レコード・新ステータスは作らない）。
  block-status:
    - {name: 検証済み, from: 対応roleのHにstatus=検証済みが1件以上}
    - {name: 未検証,   from: 対応roleのHはあるがstatus=検証済みが無い}
    - {name: 空白,     from: 対応roleのHが1件も無い（＝未着手の盲点）}

  # 検証の優先順は記入順(sketch-order)と別。本家: 左→右で埋めず、最もリスキー（重要×証拠なし）な前提から検証する。
  # 具体の優先度は ACT frontmatter の riskiest-assumption と /plan の重要度×証拠マップで決める。
  validation-order: riskiest-first

  # ブロックの意味はステージで変わる（本家の3段階: 課題解決フィット→PMF→スケール）。
  # early = 初期(CPF/PSF付近)の検証レンズ / scale = 後期(PMF以降)のレンズ。
  stage-lens:
    channels:
      early: 想定顧客に会って学ぶための経路（Day1から作る「顧客への道」。インタビュー・デモに到達する手段）
      scale: 反復可能でスケールする流通チャネル
    metrics:
      early: 顧客工場(AARRR)のどの一歩が詰まっているかを見る少数の学習指標
      scale: 事業の健全性を測る主要指標
    revenue:
      early: 価格も仮説。〈支払い〉意思の検証対象（interest ≠ intent）
      scale: 反復可能な収益モデル
